kind = "web"
previewPath = "/"
title = "Setspace"
version = "1.0.0"
id = "artifacts/setspace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25670
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/setspace run dev"

[services.env]
PORT = "25670"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/setspace", "run", "build"]
publicDir = "artifacts/setspace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
